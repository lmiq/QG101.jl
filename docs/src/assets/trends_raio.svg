<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 195" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="g-raio" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#deeeff"/>
      <stop offset="100%" stop-color="#1a4e8a"/>
    </linearGradient>
    <marker id="a-raio" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#1a4e8a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="155" y="15" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Raio Atômico</text>

  <!-- Periodic table rectangle with gradient (dark = large radius, at bottom-left) -->
  <rect x="55" y="24" width="190" height="130" rx="3" fill="url(#g-raio)" stroke="#5577aa" stroke-width="1.5"/>

  <!-- Period separator lines (7 periods) -->
  <line x1="55" y1="42.6" x2="245" y2="42.6" stroke="white" stroke-width="0.7" opacity="0.45"/>
  <line x1="55" y1="61.1" x2="245" y2="61.1" stroke="white" stroke-width="0.7" opacity="0.45"/>
  <line x1="55" y1="79.7" x2="245" y2="79.7" stroke="white" stroke-width="0.7" opacity="0.45"/>
  <line x1="55" y1="98.3" x2="245" y2="98.3" stroke="white" stroke-width="0.7" opacity="0.45"/>
  <line x1="55" y1="116.9" x2="245" y2="116.9" stroke="white" stroke-width="0.7" opacity="0.45"/>
  <line x1="55" y1="135.4" x2="245" y2="135.4" stroke="white" stroke-width="0.7" opacity="0.45"/>

  <!-- Period labels -->
  <text x="52" y="36"  text-anchor="end" font-size="9" fill="#555">1</text>
  <text x="52" y="55"  text-anchor="end" font-size="9" fill="#555">2</text>
  <text x="52" y="73"  text-anchor="end" font-size="9" fill="#555">3</text>
  <text x="52" y="92"  text-anchor="end" font-size="9" fill="#555">4</text>
  <text x="52" y="110" text-anchor="end" font-size="9" fill="#555">5</text>
  <text x="52" y="129" text-anchor="end" font-size="9" fill="#555">6</text>
  <text x="52" y="148" text-anchor="end" font-size="9" fill="#555">7</text>

  <!-- Horizontal arrow: points LEFT (← property increases going left in period) -->
  <line x1="241" y1="169" x2="65" y2="169" stroke="#1a4e8a" stroke-width="2.2" marker-end="url(#a-raio)"/>
  <text x="153" y="183" text-anchor="middle" font-size="11" fill="#1a4e8a">aumenta no período</text>

  <!-- Vertical arrow: points DOWN (↓ property increases going down in group) -->
  <line x1="30" y1="29" x2="30" y2="148" stroke="#1a4e8a" stroke-width="2.2" marker-end="url(#a-raio)"/>
  <text x="14" y="89" text-anchor="middle" font-size="11" fill="#1a4e8a" transform="rotate(-90,14,89)">aumenta no grupo</text>
</svg>
